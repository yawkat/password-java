name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Upload server jar
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/master'
        with:
          name: server-shaded
          path: server/target/server-1.0-SNAPSHOT-shaded.jar

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: server-shaded

      - name: Create or update rolling release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest Build
          body: "Rolling release from the latest master build."
          artifacts: server-1.0-SNAPSHOT-shaded.jar
          artifactName: server-shaded.jar
          allowUpdates: true
          removeArtifacts: true
          makeLatest: true
